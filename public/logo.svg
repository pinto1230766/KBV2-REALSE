<svg 
  viewBox="0 0 100 100" 
  width="1024"
  height="1024"
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="appleSquircle">
      <path d="M0,50 C0,5 5,0 50,0 C95,0 100,5 100,50 C100,95 95,100 50,100 C5,100 0,95 0,50" />
    </clipPath>

    <linearGradient id="primaryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF" />
      <stop offset="100%" stop-color="#00144D" />
    </linearGradient>
    
    <radialGradient id="meshGlow" cx="20%" cy="20%" r="80%" fx="20%" fy="20%">
      <stop offset="0%" stop-color="#00D1FF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#00D1FF" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="logoGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2" />
      <stop offset="50%" stop-color="white" stop-opacity="0" />
      <stop offset="100%" stop-color="white" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <g clip-path="url(#appleSquircle)">
    <rect width="100" height="100" fill="url(#primaryBg)" />
    <rect width="100" height="100" fill="url(#meshGlow)" />
    <rect width="100" height="100" fill="url(#logoGloss)" />
    <path d="M1,50 C1,6 6,1 50,1 C94,1 99,6 99,50 C99,94 94,99 50,99 C6,99 1,94 1,50" stroke="white" stroke-opacity="0.1" stroke-width="0.5" fill="none" />
  </g>

  <text 
    x="50.2" 
    y="42.2" 
    text-anchor="middle" 
    fill="black" 
    fill-opacity="0.3"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900" 
    font-size="32"
    letter-spacing="-1.6"
  >
    KBV
  </text>
  <text 
    x="50" 
    y="42" 
    text-anchor="middle" 
    fill="white"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900" 
    font-size="32"
    letter-spacing="-1.6"
  >
    KBV
  </text>

  <g transform="translate(22, 78)">
    <circle r="10" fill="#003399" stroke="white" stroke-opacity="0.2" stroke-width="0.5" />
    <rect x="-10" y="0" width="20" height="1" fill="white" />
    <rect x="-10" y="1" width="20" height="1" fill="#D21034" />
    <rect x="-10" y="2" width="20" height="1" fill="white" />
    <circle r="4.5" cx="-1" cy="1" fill="none" stroke="#FFD700" stroke-width="1.2" stroke-dasharray="0.3 2.5" />
  </g>

  <g transform="translate(68, 70)">
    <rect x="-15" y="-8" width="30" height="0.4" fill="white" fill-opacity="0.25" rx="0.2" />
    <text 
      x="-2" 
      y="8" 
      text-anchor="middle" 
      fill="white" 
      fill-opacity="0.85"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="700" 
      font-size="10" 
      letter-spacing="1"
    >
      FP
    </text>
    <text 
      x="8" 
      y="6" 
      text-anchor="middle" 
      fill="white" 
      fill-opacity="0.8"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="400" 
      font-size="5" 
    >
      &#169;
    </text>
  </g>
</svg>
