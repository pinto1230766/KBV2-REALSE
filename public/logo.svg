<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="80" ry="80"/>
    </clipPath>
  </defs>
  
  <!-- Cape Verde flag background - blue stripe -->
  <rect x="0" y="0" width="512" height="171" fill="#003893" clip-path="url(#roundRect)"/>
  
  <!-- Cape Verde flag background - white stripe -->
  <rect x="0" y="171" width="512" height="170" fill="#ffffff" clip-path="url(#roundRect)"/>
  
  <!-- Cape Verde flag background - red stripe -->
  <rect x="0" y="341" width="512" height="171" fill="#ce1126" clip-path="url(#roundRect)"/>
  
  <!-- Outer border -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="none" stroke="#1e3a5f" stroke-width="8" clip-path="url(#roundRect)"/>
  
  <!-- KBV text with shadow -->
  <text x="256" y="295" font-family="Arial, sans-serif" font-size="160" font-weight="900" fill="#1e3a5f" text-anchor="middle">KBV</text>
  <text x="254" y="293" font-family="Arial, sans-serif" font-size="160" font-weight="900" fill="white" text-anchor="middle">KBV</text>
  
  <!-- FP text with shadow -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#1e3a5f" text-anchor="middle">FP</text>
  <text x="254" y="398" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">FP</text>
</svg>