<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b"/>
            <stop offset="100%" style="stop-color:#0f172a"/>
        </linearGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fbbf24"/>
            <stop offset="50%" style="stop-color:#f97316"/>
            <stop offset="100%" style="stop-color:#fbbf24"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
    <!-- Border -->
    <rect x="10" y="10" width="492" height="492" rx="90" fill="none" stroke="#fbbf24" stroke-width="8" opacity="0.5"/>
    <!-- KBV Text -->
    <text x="256" y="300" font-family="Arial, sans-serif" font-size="200" font-weight="900" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle">KBV</text>
    <!-- FP Text -->
    <text x="256" y="420" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#94a3b8" text-anchor="middle">FP</text>
</svg>