<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
    <!-- Vert (2/5) -->
    <rect width="240" height="400" fill="#006600"/>
    <!-- Blanc (1/5) -->
    <rect x="240" width="120" height="400" fill="#fff"/>
    <!-- Rouge (2/5) -->
    <rect x="360" width="240" height="400" fill="#FF0000"/>
    <!-- Armoiries -->
    <circle cx="300" cy="200" r="70" fill="#fff"/>
    <circle cx="300" cy="200" r="55" fill="#fff" stroke="#FF0000" stroke-width="2"/>
    <!-- Blason rouge -->
    <path d="M300 160 L300 240 M270 180 L300 200 L330 180 M270 220 L300 200 L330 220" stroke="#FF0000" stroke-width="8" fill="none"/>
    <circle cx="300" cy="200" r="15" fill="#FF0000"/>
    <!-- Armes (simplifiées) -->
    <rect x="270" y="130" width="60" height="140" fill="#FF0000" rx="5"/>
    <rect x="280" y="140" width="40" height="120" fill="#fff" rx="3"/>
    <circle cx="300" cy="180" r="12" fill="#FF0000"/>
    <circle cx="300" cy="220" r="8" fill="#FF0000"/>
    <rect x="290" y="160" width="20" height="30" fill="#FF0000"/>
    <rect x="280" y="150" width="5" height="100" fill="#FF0000"/>
    <rect x="315" y="150" width="5" height="100" fill="#FF0000"/>
</svg>