<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
    <!-- Bande bleue (2/5 = 256px) -->
    <rect width="256" height="400" fill="#002395"/>

    <!-- Bandes blanches et rouges (chacune 1/5 = 80px) -->
    <rect x="256" width="192" height="200" fill="#fff"/>
    <rect x="256" y="200" width="192" height="200" fill="#FF0000"/>

    <!-- Ligne de démarcation -->
    <line x1="256" y1="0" x2="256" y2="400" stroke="#000" stroke-width="1"/>

    <!-- Étoiles dans la bande bleue (10 étoiles pour les 10 îles) -->
    <!-- Ces étoiles sont disposées en cercle représentant les îles -->
    <circle cx="128" cy="80" r="18" fill="#FFDF00"/>
    <circle cx="90" cy="110" r="18" fill="#FFDF00"/>
    <circle cx="70" cy="160" r="18" fill="#FFDF00"/>
    <circle cx="90" cy="210" r="18" fill="#FFDF00"/>
    <circle cx="128" cy="240" r="18" fill="#FFDF00"/>
    <circle cx="166" cy="210" r="18" fill="#FFDF00"/>
    <circle cx="186" cy="160" r="18" fill="#FFDF00"/>
    <circle cx="166" cy="110" r="18" fill="#FFDF00"/>
    <!-- Deux étoiles supplémentaires pour les îles du nord -->
    <circle cx="128" cy="40" r="12" fill="#FFDF00"/>
    <circle cx="128" cy="280" r="12" fill="#FFDF00"/>

    <!-- Étoile noire dans la bande rouge (symbole de l'émancipation) -->
    <polygon points="380,160 390,185 418,185 396,202 406,228 380,212 354,228 364,202 342,185 370,185" fill="#000" transform="translate(-20, 0) scale(1.3)"/>
</svg>